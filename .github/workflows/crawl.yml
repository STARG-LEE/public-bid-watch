name: 공공 공고 수집 (나라장터 · 기업마당)

on:
  schedule:
    # KST 매일 오전 8:30 = UTC 23:30 (전날)
    - cron: "30 23 * * *"
  workflow_dispatch:
    inputs:
      days:
        description: "최근 며칠치를 조회할까요?"
        required: false
        default: "1"
  # 코드/스타일 변경 푸시 시 자동 빌드·배포.
  # paths-ignore 로 자동 데이터 커밋(chore(data): ...)은 무시 → 무한 루프 방지.
  push:
    branches: [main]
    paths-ignore:
      - 'data/**'
      - 'docs/data/**'
      - '*.md'
      - 'LICENSE'
      - '.gitignore'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  # 같은 브랜치 동시 실행 막아서 데이터 파일 push race 방지
  group: crawl-${{ github.ref }}
  cancel-in-progress: true

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: 레포 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 나라장터 공고 수집
        env:
          NARA_SERVICE_KEY: ${{ secrets.NARA_SERVICE_KEY }}
          TZ: Asia/Seoul
        run: |
          if [ -n "${{ github.event.inputs.days }}" ]; then
            python scripts/crawl.py --days "${{ github.event.inputs.days }}"
          else
            python scripts/crawl.py
          fi

      - name: 기업마당 공고 수집
        env:
          BIZINFO_API_KEY: ${{ secrets.BIZINFO_API_KEY }}
          TZ: Asia/Seoul
        # 키 없는 환경에서도 워크플로우가 죽지 않도록 continue-on-error
        continue-on-error: true
        run: python scripts/crawl_bizinfo.py

      - name: 국가R&D 통합공고(IRIS) 수집
        env:
          TZ: Asia/Seoul
        # IRIS 사이트 변경 시 죽지 않게
        continue-on-error: true
        run: python scripts/crawl_iris.py

      - name: 한국연구재단(NRF) 공고 수집
        env:
          TZ: Asia/Seoul
        continue-on-error: true
        run: python scripts/crawl_nrf.py

      - name: 정보통신기획평가원(IITP) 입찰공고 수집
        env:
          TZ: Asia/Seoul
        continue-on-error: true
        run: python scripts/crawl_iitp.py

      - name: 관련성 점수 평가 (LLM)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TZ: Asia/Seoul
        # LLM 키 없는 환경에서도 워크플로우가 죽지 않도록 — 미평가 항목은 통과시킴
        continue-on-error: true
        run: python scripts/score_relevance.py

      - name: 대시보드 인덱스 생성
        env:
          TZ: Asia/Seoul
        run: python scripts/build_index.py

      - name: 변경사항 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # rebase 시 충돌 나면 우리 쪽(이번 실행 결과) 우선
          git config pull.rebase true
          git config rebase.autoStash true
          git add data/ docs/data/
          if git diff --cached --quiet; then
            echo "변경사항 없음 — 커밋 스킵"
            exit 0
          fi
          STAMP=$(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M')
          git commit -m "chore(data): 공고 수집 ${STAMP} KST"
          # race condition 대비 최대 3회 rebase 재시도
          for i in 1 2 3; do
            if git push; then
              echo "push 성공 (시도 $i)"
              exit 0
            fi
            echo "push 충돌 — pull --rebase 후 재시도 ($i/3)"
            # 데이터 충돌 시 우리(이번 실행 결과) 쪽 채택
            git pull --rebase -X ours || git rebase --abort
          done
          echo "::error::push 3회 재시도 모두 실패"
          exit 1

  deploy-pages:
    needs: crawl
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 최신 체크아웃
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Pages 설정
        uses: actions/configure-pages@v5

      - name: docs/ 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      - name: Pages 배포
        id: deployment
        uses: actions/deploy-pages@v4
